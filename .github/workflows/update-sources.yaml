# Or commit to trigger the pre-commit hook if enabled.
concurrency:
  cancel-in-progress: true
  group: update-sources
jobs:
  merge-to-main:
    if: 'false'
    needs:
    - update-aarch64-darwin
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Run nix flake check
      run: nix flake check
    - name: Squash merge and push to main
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin bot/update-packages
        git merge --squash origin/bot/update-packages
        if git diff --cached --quiet; then
          echo "No changes to merge"
        else
          git commit -m "Update package versions"
          git push origin main
        fi
        git push origin --delete bot/update-packages || true
  update-aarch64-darwin:
    needs:
    - update-x86_64-linux
    runs-on: macos-14
    steps:
    - continue-on-error: true
      id: checkout-bot-branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: bot/update-packages
    - if: steps.checkout-bot-branch.outcome == 'failure'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      name: Run update script
      run: |-
        chmod +x ./ci/update.sh
        ./ci/update.sh
    - uses: EndBug/add-and-commit@v9
      with:
        add: packages/**/default.nix
        default_author: github_actions
        message: Update packages for aarch64-darwin
        new_branch: bot/update-packages
        push: origin bot/update-packages --force --set-upstream
  update-x86_64-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      name: Run update script
      run: |-
        chmod +x ./ci/update.sh
        ./ci/update.sh
    - uses: EndBug/add-and-commit@v9
      with:
        add: packages/**/default.nix
        default_author: github_actions
        message: Update packages for x86_64-linux
        new_branch: bot/update-packages
        push: origin bot/update-packages --force --set-upstream
name: update-sources
'on':
  push:
    branches:
    - main
  schedule:
  - cron: 0 0 * * *
  workflow_dispatch: {}
